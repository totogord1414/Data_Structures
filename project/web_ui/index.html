<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园导航系统 - 图形化拓扑预览</title>
    <!-- 引入 vis-network 来渲染力导向图 -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <!-- 左侧图表区域 -->
        <div id="network-canvas"></div>
        
        <!-- 右侧控制台 -->
        <div id="panel">
            <h1>Campus Navigator</h1>
            <p class="subtitle">校园路径规划可视化</p>
            
            <div class="card">
                <h3>节点信息</h3>
                <div id="node-info">点击左侧图表中的地点查看详情...</div>
            </div>

            <div class="card">
                <h3>高亮展示</h3>
                <p class="hint">此功能仅作前端模拟展示，演示图形化界面的效果。</p>
                <button onclick="highlightDemoPath()" class="btn-primary">演示：最短路径高亮</button>
                <button onclick="resetGraph()" class="btn-secondary">重置图表</button>
            </div>
            
            <div class="footer">
                <p>Extension 3: Graphical Interface</p>
                <p>Data loaded from local CSV</p>
            </div>
        </div>
    </div>
    
    <!-- 引入解析 CSV 的轻量级工具 PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
